name: Cloudflare Pages 배포

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ENV: ${{ secrets.ENV }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정 (v24)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Puppeteer Chrome 캐시
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: 의존성 설치 및 빌드
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: |
          npm install
          for dir in node_modules/.cache/puppeteer/chrome/linux-*; do
            [ -d "$dir" ] && [ ! -f "$dir/chrome-linux64/chrome" ] && rm -rf "$dir"
          done
          npx puppeteer browsers install chrome
          echo "${{ env.ENV }}" > .env.prod
          npm run build

      - name: Cloudflare Pages 배포
        run: npx wrangler pages deploy dist --project-name=q-asker --branch=main
