name: Cloudflare Pages 배포

on:
  push:
    branches:
      - ICC-347
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ENV: ${{ secrets.ENV }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정 (v24)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Puppeteer Chrome 캐시
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: 의존성 설치 및 빌드
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: |
          npm install
          if [ -d node_modules/.cache/puppeteer ] && ! find node_modules/.cache/puppeteer -name chrome -type f -executable 2>/dev/null | grep -q .; then
            echo "캐시된 Chrome 실행파일 없음 — 캐시 정리"
            rm -rf node_modules/.cache/puppeteer
          fi
          npx puppeteer install
          find node_modules/.cache/puppeteer -name chrome -type f -executable | head -1 || (echo "Chrome 설치 검증 실패" && exit 1)
          echo "${{ env.ENV }}" > .env.prod
          npm run build

      - name: Cloudflare Pages 배포
        run: npx wrangler pages deploy dist --project-name=q-asker --branch=main
